services:
  # Backend 서비스
  dragon-be:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dragon-be
    ports:
      - "8000:8000"
    depends_on:
      - dragon-db
    environment:
      - DEBUG=True
      - API_HOST=${API_HOST:-http://dragon-be:8000}
      - DATABASE_URL=${DATABASE_URL}
      - TZ=Asia/Seoul
    networks:
      - dragon
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend 서비스
  dragon-fe:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dragon-fe
    ports:
      - "3000:3000"
    networks:
      - dragon
    depends_on:
      - dragon-be
    environment:
      - VITE_API_URL=http://localhost:8000
      - TZ=Asia/Seoul
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Database 서비스
  dragon-db:
    image: postgres:15-alpine
    container_name: dragon-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - 5432:5432
    volumes:
      - ./postgresql/data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dragon

networks:
  dragon:
    driver: bridge

volumes:
  dragon-db-data:
