name: Build & Deploy Vite App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3   
        with:
          version: 9                 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@8.0.3
        with:
          switches: -avz --delete
          path: dist/
          remote_path: ~/team-dragon/nginx/html/
          remote_host: sanarae.duckdns.org
          remote_user: ubuntu
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}